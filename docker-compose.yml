version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: admink_app
    restart: unless-stopped
    ports:
      - "8086:80"
    volumes:
      - ./admink/admink:/var/www/html
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=admink_db
      - DB_USERNAME=admink_user
      - DB_PASSWORD=secret
    depends_on:
      - db

  db:
    image: mariadb:10.5
    container_name: admink_db
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      - MARIADB_DATABASE=admink_db
      - MARIADB_USER=admink_user
      - MARIADB_PASSWORD=secret
      - MARIADB_ROOT_PASSWORD=root_secret
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data: